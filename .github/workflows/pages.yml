name: Сайт

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  # The lightweight release dispatcher must not be cancelled by the deployment
  # it starts. Push/manual deployments still cancel older deployments.
  group: ${{ github.event_name == 'release' && 'pages-refresh' || 'pages-deploy' }}
  cancel-in-progress: true

jobs:
  refresh-after-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Запустить публикацию из разрешённой ветки main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/dispatches" \
            -f ref=main

  deploy:
    if: github.event_name != 'release'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Подставить данные последнего APK-релиза
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release=$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=1" --jq '.[0]' 2>/dev/null || true)
          if [ -n "$release" ] && echo "$release" | jq -e '.tag_name and .published_at' >/dev/null; then
            version=$(echo "$release" | jq -r '.tag_name')
            date=$(echo "$release" | jq -r '.published_at | split("T")[0]')
            apk=$(echo "$release" | jq -r '.assets[] | select(.name == "preflop-trainer.apk") | .browser_download_url' | head -1)
            checksum_url=$(echo "$release" | jq -r '.assets[] | select(.name == "preflop-trainer.apk.sha256") | .browser_download_url' | head -1)
            checksum="Не опубликован"
            if [ -n "$checksum_url" ]; then checksum=$(curl -fsSL "$checksum_url" | awk '{print $1}'); fi
            status=$(echo "$release" | jq -r 'if .prerelease then "preview" else "release" end')
            jq -n --arg version "$version" --arg date "$date" --arg apk "$apk" --arg checksum "$checksum" --arg status "$status" \
              '{version:$version,date:$date,apkUrl:$apk,sha256:$checksum,minAndroid:"Android 7.0+",status:$status}' > site/release.json
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Опубликовать GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
